<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NK2 Wiki — Land of Jail</title>
  <meta name="description" content="Wiki de l'alliance NK2 — Land of Jail : guides des héros, stratégies (Cage, Vague de colère, SvS) et calendrier des événements." />
  <meta property="og:title" content="NK2 Wiki — Land of Jail" />
  <meta property="og:description" content="Guides des héros, stratégies et calendrier des événements de l'alliance NK2." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#0a0c0f" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --card:      #161b22;
      --border:    #2a3040;
      --accent:    #c8960a;
      --accent2:   #e8b420;
      --danger:    #c0392b;
      --text:      #d4d8e0;
      --muted:     #6b7280;
      --green:     #2ecc71;
      --blue:      #3498db;
      --violet:    #9b59b6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0d1117 0%, var(--bg) 100%);
      overflow: hidden;
    }
    .header-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
    }
    .header-inner {
      position: relative; max-width: 1100px; margin: 0 auto;
      padding: 48px 24px 40px; display: flex; align-items: center; gap: 24px;
    }
    .header-emblem {
      width: 72px; height: 72px; border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
      background: rgba(200,150,10,0.08); flex-shrink: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3.4rem);
      letter-spacing: 4px; color: #fff; line-height: 1;
    }
    .header-text h1 span { color: var(--accent); }
    .header-text p {
      font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
      color: var(--muted); letter-spacing: 2px; margin-top: 6px;
    }

    .lang-bar { background: var(--surface); border-bottom: 1px solid var(--border); }
    .lang-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; gap: 0; overflow-x: auto;
    }
    .lang-label {
      font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted);
      letter-spacing: 2px; padding-right: 16px; border-right: 1px solid var(--border);
      margin-right: 4px; white-space: nowrap;
    }
    .lang-btn {
      background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif;
      font-size: 0.82rem; font-weight: 600; padding: 10px 14px; cursor: pointer;
      letter-spacing: 1px; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    nav { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 2px; overflow-x: auto; }
    .nav-btn {
      background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif;
      font-size: 0.85rem; font-weight: 600; padding: 14px 20px; cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
    .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .section { display: none; animation: fadeIn 0.3s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 4px; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 14px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent) 0%, transparent 100%); }
    .section-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 32px; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 24px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), transparent); }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-tier { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; padding: 3px 8px; border: 1px solid; display: inline-block; margin-bottom: 12px; }
    .tier-1 { color: var(--blue); border-color: var(--blue); }
    .tier-2 { color: var(--accent); border-color: var(--accent); }
    .tier-3 { color: var(--danger); border-color: var(--danger); }
    .tier-4 { color: var(--danger); border-color: var(--danger); }
    .tier-green  { color: var(--green);   border-color: var(--green); }
    .tier-violet { color: var(--violet);  border-color: var(--violet); }
    .tier-gold   { color: var(--accent2); border-color: var(--accent2); }
    .tier-gray   { color: var(--muted);   border-color: var(--muted); }
    .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
    .card-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; white-space: pre-line; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; letter-spacing: 1px; }
    .stat-value { color: var(--text); font-weight: 600; text-align: right; }
    .stat-value.good { color: var(--green); }
    .stat-value.warn { color: var(--accent); }
    .stat-value.bad  { color: var(--danger); }

    .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .event-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 20px 24px; position: relative; transition: border-color 0.2s; }
    .event-card.type-war  { border-left-color: var(--danger); }
    .event-card.type-rally{ border-left-color: #9b59b6; }
    .event-card.type-resource { border-left-color: var(--green); }
    .event-date { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
    .event-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: #fff; margin-bottom: 6px; }
    .event-desc { font-size: 0.83rem; color: var(--muted); white-space: pre-line; }
    .event-tag { position: absolute; top: 20px; right: 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 1px; padding: 3px 8px; border: 1px solid currentColor; }
    .tag-war      { color: var(--danger); }
    .tag-rally    { color: #9b59b6; }
    .tag-resource { color: var(--green); }
    .tag-alliance { color: var(--accent); }

    .callout { border: 1px solid var(--border); border-left: 4px solid var(--accent); background: rgba(200,150,10,0.05); padding: 16px 20px; margin-bottom: 24px; font-size: 0.88rem; white-space: pre-line; }
    .callout.danger { border-left-color: var(--danger); background: rgba(192,57,43,0.06); }
    .callout strong { color: var(--accent2); }
    .callout.danger strong { color: var(--danger); }

    .data-table { width: 100%; border-collapse: separate; font-size: 0.85rem; margin-bottom: 32px; overflow-x: auto; display: block; }
    .data-table th { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid var(--accent); padding: 10px 14px; text-align: center; background: var(--card); }
    .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: center; color: var(--text); }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }

    .welcome-banner { background: var(--card); border: 1px solid var(--border); padding: 32px; margin-bottom: 32px; position: relative; overflow: hidden; }
    .welcome-banner::after { content: '⚔'; position: absolute; right: 32px; top: 50%; transform: translateY(-50%); font-size: 6rem; opacity: 0.04; }
    .welcome-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--accent2); margin-bottom: 10px; }
    .welcome-banner p { font-size: 0.92rem; color: var(--text); max-width: 600px; }

    .quick-links { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .quick-link { background: var(--card); border: 1px solid var(--border); padding: 18px 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
    .quick-link:hover { border-color: var(--accent); }
    .quick-link .ql-icon { font-size: 1.6rem; }
    .quick-link .ql-text strong { display: block; font-size: 0.88rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
    .quick-link .ql-text span { font-size: 0.75rem; color: var(--muted); }

    .hero-strip { margin: 12px 0 4px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
    .hero-strip-label { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 2px; color: var(--muted); display: block; margin-bottom: 8px; }
    .hero-strip-imgs { display: flex; flex-wrap: wrap; gap: 6px; }
    .hero-thumb { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hero-thumb img { width: 56px; height: 56px; object-fit: cover; object-position: top; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); transition: border-color 0.2s, transform 0.2s; }
    .hero-thumb img:hover { border-color: var(--accent); transform: scale(1.2); }
    .hero-thumb span { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.5px; text-align: center; }
    .hero-thumb[data-hero] { cursor: pointer; }
    .hero-thumb[data-hero]:focus { outline: none; }
    .hero-thumb[data-hero]:focus img { border-color: var(--accent); }

    /* ── INFOBULLE DES CAPACITÉS (survol des héros) ── */
    .hero-tip {
      position: fixed; z-index: 2000; min-width: 168px; max-width: 240px;
      background: var(--card); border: 1px solid var(--accent);
      padding: 10px 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      opacity: 0; visibility: hidden; transform: translateY(4px);
      transition: opacity 0.12s ease, transform 0.12s ease; pointer-events: none;
    }
    .hero-tip.show { opacity: 1; visibility: visible; transform: translateY(0); }
    .hero-tip .ht-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 1.5px; color: #fff; margin-bottom: 8px; }
    .hero-tip .ht-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .hero-tip .ht-row:last-child { border-bottom: none; }
    .hero-tip .ht-label { font-family: 'Share Tech Mono', monospace; font-size: 0.64rem; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
    .hero-tip .ht-val { font-size: 0.85rem; }
    html[dir="rtl"] .hero-tip .ht-row { flex-direction: row-reverse; }

    /* ── CARROUSEL DE CARTE ── */
    .hero-carousel { position: relative; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; }
    .hc-track { position: relative; width: 100%; aspect-ratio:3/4 ; background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .hc-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.45s ease; }
    .hc-slide.active { opacity: 1; }
    .hc-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hc-prev, .hc-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 1.3rem; line-height: 1; cursor: pointer; padding: 4px 10px; z-index: 2; transition: background 0.2s, color 0.2s; }
    .hc-prev { left: 6px; } .hc-next { right: 6px; }
    .hc-prev:hover, .hc-next:hover { background: var(--accent); color: #0a0c0f; }
    .hc-dots { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
    .hc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.2s; }
    .hc-dot.active { background: var(--accent); }

    /* ── VIDÉO YOUTUBE DE CARTE ── */
    .hero-video { margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; }
    .hv-frame { position: relative; width: 100%; aspect-ratio: 16/9; background: var(--surface); border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
    .hv-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hv-play {
      position: absolute; inset: 0; margin: auto; width: 56px; height: 56px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: 2px solid #fff; color: #fff; font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s;
    }
    .hv-frame:hover .hv-play { background: var(--accent); border-color: var(--accent); color: #0a0c0f; }
    .hv-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

    footer { border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 2px; }

    /* ── CUSTOM SECTION TYPES ── */
    .content-block { background: var(--card); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 16px; }
    .content-block.callout { border-left: 4px solid var(--accent); background: rgba(200,150,10,0.05); }
    .content-block h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 1.5px; color: #fff; margin-bottom: 8px; }
    .content-block.callout h3 { color: var(--accent2); }
    .content-block p { font-size: 0.9rem; color: var(--text); white-space: pre-line; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .gallery-item { background: var(--card); border: 1px solid var(--border); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .gallery-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .gallery-item img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; background: var(--surface); }
    .gallery-item .caption { padding: 10px 14px; font-size: 0.82rem; color: var(--muted); }

    .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .link-card { background: var(--card); border: 1px solid var(--border); padding: 18px 20px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all 0.2s; }
    .link-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .link-card .lk-icon { font-size: 1.6rem; flex-shrink: 0; }
    .link-card .lk-text strong { display: block; font-size: 0.9rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
    .link-card .lk-text span { font-size: 0.76rem; color: var(--muted); }

    .loading-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 999;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace; color: var(--accent); letter-spacing: 3px; font-size: 0.9rem;
    }
    .admin-link {
      position: fixed; bottom: 16px; right: 16px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      color: var(--muted); text-decoration: none; opacity: 0.4; letter-spacing: 1px;
      border: 1px solid var(--border); padding: 4px 8px; transition: opacity 0.2s;
    }
    .admin-link:hover { opacity: 1; color: var(--accent); }

    /* ── FORMULAIRE DE SIGNALEMENT ── */
    .report-form { max-width: 720px; }
    .report-field { margin-bottom: 22px; }
    .report-field > label {
      display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.68rem;
      letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
    }
    .report-field input[type="text"],
    .report-field textarea,
    .report-field select {
      width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 11px 13px; font-family: 'Barlow', sans-serif; font-size: 0.92rem; border-radius: 2px;
    }
    .report-field input[type="text"]:focus,
    .report-field textarea:focus,
    .report-field select:focus { outline: none; border-color: var(--accent); }
    .report-field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .report-tabs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .report-check {
      display: flex; align-items: center; gap: 9px; background: var(--surface);
      border: 1px solid var(--border); padding: 9px 12px; cursor: pointer; transition: border-color 0.2s;
      font-size: 0.86rem; color: var(--text);
    }
    .report-check:hover { border-color: var(--accent); }
    .report-check input { width: auto; accent-color: var(--accent); cursor: pointer; }
    .report-check.checked { border-color: var(--accent); background: rgba(200,150,10,0.06); }
    .report-honey { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }
    .report-submit {
      font-family: 'Barlow', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      background: var(--accent); color: #0a0c0f; border: 1px solid var(--accent); padding: 12px 26px;
      font-size: 0.88rem; cursor: pointer; border-radius: 2px; transition: background 0.2s;
    }
    .report-submit:hover { background: var(--accent2); }
    .report-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .report-status { margin-top: 16px; font-size: 0.88rem; min-height: 1.2rem; }
    .report-status.ok { color: var(--green); }
    .report-status.err { color: var(--danger); }
    html[dir="rtl"] .report-field > label { text-align: right; }

    @media (max-width: 600px) {
      .header-inner { padding: 28px 16px 24px; }
      .lang-inner, .nav-inner { padding: 0 12px; }
      main { padding: 24px 16px 60px; }
      .cards-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loading" class="loading-screen">CHARGEMENT...</div>

<header>
  <div class="header-grid"></div>
  <div class="header-inner">
    <div class="header-emblem">⚔️</div>
    <div class="header-text">
      <h1>NK2 <span>WIKI</span></h1>
      <p>// LAND OF JAIL</p>
    </div>
  </div>
</header>

<div class="lang-bar">
  <div class="lang-inner">
    <span class="lang-label">LANG</span>
    <button class="lang-btn active" data-lang="fr" aria-label="Français" title="Français">🇫🇷</button>
    <button class="lang-btn" data-lang="en" aria-label="English" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="it" aria-label="Italiano" title="Italiano">🇮🇹</button>
    <button class="lang-btn" data-lang="pt" aria-label="Português" title="Português">🇧🇷</button>
    <button class="lang-btn" data-lang="ar" aria-label="العربية" title="العربية">🇸🇦</button>
    <button class="lang-btn" data-lang="ja" aria-label="日本語" title="日本語">🇯🇵</button>
  </div>
</div>

<nav>
  <div class="nav-inner" id="nav-inner"></div>
</nav>

<main id="main"></main>

<footer id="footer"></footer>

<script type="module">
  // ── Firebase ──
  // Le SDK Firestore (lourd) n'est PLUS chargé au démarrage.
  // • Lecture du contenu  → API REST Firestore en fetch() pur (aucun SDK).
  // • Écritures (visites, signalements) → SDK chargé à la demande, en arrière-plan,
  //   donc hors du chemin critique de rendu. Le comportement des écritures
  //   (serverTimestamp, règles de sécurité) reste strictement identique.
  const firebaseConfig = {
    apiKey: "AIzaSyCWADXq-C8yTrc3XeO7GI44bYQo8inatQk",
    authDomain: "nk2-wiki.firebaseapp.com",
    projectId: "nk2-wiki",
    storageBucket: "nk2-wiki.firebasestorage.app",
    messagingSenderId: "93044027032",
    appId: "1:93044027032:web:9daf883017bef141466aed"
  };

  // Base REST Firestore pour la lecture du document de contenu.
  const FS_REST_BASE = `https://firestore.googleapis.com/v1/projects/${firebaseConfig.projectId}/databases/(default)/documents`;

  // Décodage du format typé de l'API REST Firestore vers un objet JS simple,
  // identique à ce que renvoyait snap.data() du SDK.
  function fsDecodeValue(v) {
    if (v == null || typeof v !== 'object') return null;
    if ('stringValue'    in v) return v.stringValue;
    if ('booleanValue'   in v) return v.booleanValue;
    if ('integerValue'   in v) return Number(v.integerValue);
    if ('doubleValue'    in v) return v.doubleValue;
    if ('nullValue'      in v) return null;
    if ('timestampValue' in v) return v.timestampValue;   // chaîne ISO (non utilisée au rendu)
    if ('mapValue'       in v) return fsDecodeFields((v.mapValue && v.mapValue.fields) || {});
    if ('arrayValue'     in v) return ((v.arrayValue && v.arrayValue.values) || []).map(fsDecodeValue);
    if ('geoPointValue'  in v) return v.geoPointValue;
    if ('referenceValue' in v) return v.referenceValue;
    if ('bytesValue'     in v) return v.bytesValue;
    return null;
  }
  function fsDecodeFields(fields) {
    const out = {};
    for (const k in fields) out[k] = fsDecodeValue(fields[k]);
    return out;
  }

  // Lecture du document site/content via REST. Renvoie l'objet décodé,
  // ou null si le document n'existe pas (404).
  async function fetchContentREST() {
    const url = `${FS_REST_BASE}/site/content?key=${encodeURIComponent(firebaseConfig.apiKey)}`;
    const r = await fetch(url, { cache: 'no-store' });
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('Firestore REST ' + r.status);
    const j = await r.json();
    return j && j.fields ? fsDecodeFields(j.fields) : null;
  }

  // Chargement paresseux du SDK Firebase, uniquement pour les écritures.
  // Mutualisé (un seul import / une seule initialisation).
  let _fbReady = null;
  function ensureFirebase() {
    if (!_fbReady) {
      _fbReady = (async () => {
        const [appMod, fs] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
        ]);
        const app = appMod.initializeApp(firebaseConfig);
        const db = fs.getFirestore(app);
        return { db, collection: fs.collection, addDoc: fs.addDoc, serverTimestamp: fs.serverTimestamp };
      })();
    }
    return _fbReady;
  }

  const IMAGES_BASE = "images/heros/";
  const RES_BASE = "images/ressources/";

  // Couleurs autorisées pour la mise en forme des descriptions (uniquement
  // celles déjà utilisées ailleurs sur le site, cf. variables CSS :root).
  const RICH_COLORS = { or: '--accent2', rouge: '--danger', vert: '--green', bleu: '--blue', violet: '--violet' };

  // Convertit le balisage léger des descriptions en HTML sûr.
  // Balises gérées : [b]gras[/b], [i]italique[/i], [u]souligné[/u],
  // [c=or|rouge|vert|bleu|violet]texte coloré[/c].
  function formatRich(raw) {
    if (raw === null || raw === undefined) return '';
    let s = String(raw)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    s = s.replace(/\[c=(or|rouge|vert|bleu|violet)\]([\s\S]*?)\[\/c\]/gi,
      (m, col, inner) => `<span style="color:var(${RICH_COLORS[col.toLowerCase()]})">${inner}</span>`);
    s = s.replace(/\[b\]([\s\S]*?)\[\/b\]/gi, '<strong>$1</strong>');
    s = s.replace(/\[i\]([\s\S]*?)\[\/i\]/gi, '<em>$1</em>');
    s = s.replace(/\[u\]([\s\S]*?)\[\/u\]/gi, '<u>$1</u>');
    return s;
  }

  // Extrait l'identifiant (11 caractères) d'une URL YouTube dans ses formats
  // usuels (watch, youtu.be, embed, shorts) ou d'un identifiant déjà brut.
  // Renvoie '' si rien n'est reconnu, pour ne rien afficher plutôt qu'un lecteur cassé.
  function extractYouTubeId(raw) {
    if (!raw) return '';
    const s = String(raw).trim();
    const m = s.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
    if (m) return m[1];
    return /^[A-Za-z0-9_-]{11}$/.test(s) ? s : '';
  }

  let DATA = null;
  let currentLang = 'fr';
  // Onglet actif courant, conservé entre les re-rendus (changement de langue,
  // réconciliation Firestore) et reflété dans l'URL pour des liens partageables.
  let currentTab = null;
  // Ancre d'URL demandée à l'ouverture (#onglet), en attente tant que l'onglet
  // visé n'est pas connu : il peut n'exister que dans Firestore et pas dans le
  // seed local. Le repli s'affiche alors SANS écraser l'ancre, qui est honorée
  // dès la réconciliation. Toute navigation de l'utilisateur annule l'attente.
  let PENDING_HASH = '';
  try { PENDING_HASH = decodeURIComponent(location.hash.slice(1)); } catch (e) {}
  // Permet de supprimer le défilement vers le haut lors d'un re-rendu silencieux
  // (réconciliation Firestore en arrière-plan), pour ne pas déplacer l'utilisateur.
  let SUPPRESS_SCROLL = false;

  // ── Traductions du formulaire de signalement (intégrées, indépendantes de DATA) ──
  const REPORT_I18N = {
    fr: { navLabel: "Signaler", title: "Signaler une erreur", sub: "// TRADUCTIONS & CORRECTIONS",

      submit: "Envoyer le signalement", sending: "Envoi…", success: "Merci ! Votre signalement a bien été envoyé.",

      intro: "Spotted a translation mistake or something to fix? Tell us which tab(s) are affected, the wrong text and, if you can, a suggestion. An admin will review it.",

      contextPh: "Paste the incorrect text here or describe where it is", proposalLabel: "Suggested fix / translation",
      proposalPh: "Your corrected version (optional)", reporterLabel: "Your in-game name (optional)",
      submit: "Send report", sending: "Sending…", success: "Thank you! Your report has been sent.",
      error: "Sending failed. Please try again later.", needTab: "Select at least one tab.", needContext: "Please enter the text concerned." },
    it: { navLabel: "Segnala", title: "Segnala un errore", sub: "// TRADUZIONI & CORREZIONI",
      intro: "Hai notato un errore di traduzione o qualcosa da correggere? Indica la/e scheda/e, il testo errato e, se puoi, una proposta. Un amministratore la verificherà.",
      tabsLabel: "Scheda/e interessata/e", langLabel: "Lingua interessata", contextLabel: "Testo interessato",
      contextPh: "Incolla qui il testo errato o descrivi dove si trova", proposalLabel: "Proposta di correzione / traduzione",
      proposalPh: "La tua versione corretta (facoltativo)", reporterLabel: "Il tuo nome di gioco (facoltativo)",
      submit: "Invia segnalazione", sending: "Invio…", success: "Grazie! La tua segnalazione è stata inviata.",
      error: "Invio non riuscito. Riprova più tardi.", needTab: "Seleziona almeno una scheda.", needContext: "Indica il testo interessato." },
    pt: { navLabel: "Reportar", title: "Relatar um erro", sub: "// TRADUÇÕES & CORREÇÕES",
      intro: "Encontrou um erro de tradução ou algo para corrigir? Informe a(s) aba(s), o texto incorreto e, se puder, uma sugestão. Um administrador vai revisar.",

      proposalPh: "Sua versão corrigida (opcional)", reporterLabel: "Seu nome no jogo (opcional)",
      submit: "Enviar relatório", sending: "Enviando…", success: "Obrigado! Seu relatório foi enviado.",
      error: "Falha no envio. Tente novamente mais tarde.", needTab: "Selecione pelo menos uma aba.", needContext: "Informe o texto relacionado." },
    ar: { navLabel: "إبلاغ", title: "الإبلاغ عن خطأ", sub: "// الترجمات والتصحيحات",
      intro: "هل لاحظت خطأ في الترجمة أو شيئًا يحتاج إلى تصحيح؟ حدد علامة (علامات) التبويب المعنية والنص الخاطئ، وإن أمكن اقتراحًا. سيقوم المشرف بمراجعته.",
      tabsLabel: "علامة (علامات) التبويب المعنية", langLabel: "اللغة المعنية", contextLabel: "النص المعني",
      contextPh: "الصق النص الخاطئ هنا أو صف موضعه", proposalLabel: "اقتراح التصحيح / الترجمة",
      proposalPh: "نسختك المصححة (اختياري)", reporterLabel: "اسمك داخل اللعبة (اختياري)",
      submit: "إرسال البلاغ", sending: "جارٍ الإرسال…", success: "شكرًا! تم إرسال بلاغك.",
      error: "فشل الإرسال. حاول مرة أخرى لاحقًا.", needTab: "اختر علامة تبويب واحدة على الأقل.", needContext: "يرجى إدخال النص المعني." },
    ja: { navLabel: "報告", title: "問題を報告", sub: "// 翻訳・修正",
      intro: "翻訳の誤りや修正が必要な箇所を見つけましたか？ 該当するタブ、誤った文章、できれば修正案を教えてください。管理者が確認します。",
      tabsLabel: "該当タブ", langLabel: "該当言語", contextLabel: "該当する文章",
      contextPh: "誤った文章を貼り付けるか、場所を説明してください", proposalLabel: "修正・翻訳の提案",
      proposalPh: "あなたの修正版（任意）", reporterLabel: "ゲーム内の名前（任意）",
      submit: "報告を送信", sending: "送信中…", success: "ありがとうございます！報告を送信しました。",
      error: "送信に失敗しました。後でもう一度お試しください。", needTab: "少なくとも1つのタブを選択してください。", needContext: "該当する文章を入力してください。" }
  };
  const REPORT_TAB_ID = '__report__';
  function ri(key) { return (REPORT_I18N[currentLang] || REPORT_I18N.fr)[key] || REPORT_I18N.fr[key] || ''; }

  async function loadData() {
    const loadingEl = document.getElementById('loading');
    let shown = false;

    // Les deux sources partent en parallèle : le seed s'affiche immédiatement,
    // et la réponse Firestore (autoritative) arrive d'autant plus tôt que sa
    // requête n'attend pas la fin du rendu du seed.
    const remotePromise = fetchContentREST();

    // 1) Rendu IMMÉDIAT depuis le seed local (même CDN que la page → très rapide).
    //    Le wiki s'affiche sans attendre Firestore ni aucun SDK.
    try {
      const seed = await loadFallback();
      if (seed && (seed.tabs || []).length) {
        DATA = seed;
        render();
        loadingEl.style.display = 'none';
        shown = true;
      }
    } catch (e) {
      // seed indisponible : on s'appuiera uniquement sur Firestore (étape 2)
    }

    // 2) Contenu autoritatif depuis Firestore (REST, sans SDK).
    //    Si plus récent/différent du seed, on remplace en préservant l'onglet,
    //    la langue et la position de défilement de l'utilisateur (zéro saut visible).
    try {
      const remote = await remotePromise;
      if (remote && (remote.tabs || []).length) {
        const differs = !shown || stableStringify(remote) !== stableStringify(DATA);
        if (differs) {
          const savedY = window.scrollY;
          SUPPRESS_SCROLL = true;
          DATA = remote;
          render();   // pickActiveTab() conserve l'onglet courant (ou l'ancre d'URL)
          SUPPRESS_SCROLL = false;
          window.scrollTo(0, savedY);
        }
        loadingEl.style.display = 'none';
        shown = true;
      }
    } catch (e) {
      console.error('Firestore (REST) indisponible :', e);
    }

    // 3) Ni seed ni Firestore exploitables.
    if (!shown) {
      loadingEl.innerHTML = "ERREUR DE CHARGEMENT<br><span style='font-size:0.7rem'>Vérifiez la connexion ou chargez les données via admin.html</span>";
    }
  }

  async function loadFallback() {
    const resp = await fetch('seed-data.json', { cache: 'no-store' });
    if (!resp.ok) throw new Error('seed-data.json introuvable');
    return await resp.json();
  }

  // Sérialisation à clés triées : l'API REST Firestore et le seed local ne
  // renvoient pas les clés dans le même ordre, un JSON.stringify brut verrait
  // donc toujours une différence et forcerait un re-rendu inutile à chaque
  // visite (avec réinitialisation des carrousels).
  function stableStringify(v) {
    if (Array.isArray(v)) return '[' + v.map(stableStringify).join(',') + ']';
    if (v && typeof v === 'object') {
      return '{' + Object.keys(v).sort().map(k => JSON.stringify(k) + ':' + stableStringify(v[k])).join(',') + '}';
    }
    return JSON.stringify(v === undefined ? null : v);
  }

  function t(obj, lang, fallback) {
    if (obj === null || obj === undefined) return fallback || '';
    if (typeof obj === 'string') return obj;
    // Une traduction vide équivaut à une traduction absente : on retombe sur le
    // français plutôt que d'afficher du vide (champ effacé dans l'admin).
    if (obj[lang] !== undefined && obj[lang] !== '') return obj[lang];
    if (obj['fr'] !== undefined && obj['fr'] !== '') return obj['fr'];
    return fallback || '';
  }

  // Les noms ne sont plus affichés sous les vignettes de héros sur l'index.
  // data-hero permet d'afficher l'infobulle des capacités (tableau comparatif).
  function heroThumb(key, label) {
    const file = (DATA.heroFiles && DATA.heroFiles[key]) || (key + '.jpg');
    const name = (DATA.heroNames && DATA.heroNames[key]) || key;
    return `<div class="hero-thumb" data-hero="${escapeAttr(key)}" tabindex="0"><img src="${IMAGES_BASE}${file}" alt="${name}" title="${name}" width="56" height="56" loading="lazy" decoding="async"></div>`;
  }

  // Vignette de ressource (même principe que les héros, dossier dédié).
  // `item` est le nom de fichier complet (ex: "fer.png"). Pour compatibilité,
  // un identifiant sans extension reçoit ".jpg" par défaut.
  function resourceThumb(item) {
    const file = /\.[a-z0-9]+$/i.test(item) ? item : (item + '.jpg');
    const name = (DATA.resourceNames && DATA.resourceNames[item]) || file.replace(/\.[a-z0-9]+$/i, '');
    return `<div class="hero-thumb"><img src="${RES_BASE}${file}" alt="${name}" title="${name}" width="56" height="56" loading="lazy" decoding="async"></div>`;
  }

  function renderNav() {
    const navInner = document.getElementById('nav-inner');
    const tabs = (DATA.tabs || []).filter(tb => tb.enabled).sort((a,b) => a.order - b.order);
    navInner.innerHTML = tabs.map((tab) => {
      const langData = (tab.i18n && (tab.i18n[currentLang] || tab.i18n.fr)) || {};
      const label = langData.label || tab.id;
      return `<button class="nav-btn" data-tab="${tab.id}">${tab.icon || ''} <span>${label}</span></button>`;
    }).join('')
      + `<button class="nav-btn" data-tab="${REPORT_TAB_ID}">📝 <span>${ri('navLabel')}</span></button>`;

    navInner.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => { PENDING_HASH = ''; showSection(btn.dataset.tab); });
    });
    // L'onglet actif est choisi de façon centralisée dans render() (cf. pickActiveTab).
  }

  // Détermine l'onglet à afficher : l'ancre d'ouverture encore en attente prime
  // dès qu'elle devient valide (l'onglet peut n'arriver qu'avec la réconciliation
  // Firestore), sinon on conserve l'onglet courant s'il existe encore (changement
  // de langue, réconciliation), sinon le premier onglet.
  function pickActiveTab() {
    const tabs = (DATA && DATA.tabs ? DATA.tabs : []).filter(tb => tb.enabled).sort((a,b) => a.order - b.order);
    const valid = id => id === REPORT_TAB_ID || tabs.some(t => t.id === id);
    if (PENDING_HASH && valid(PENDING_HASH)) {
      const id = PENDING_HASH;
      PENDING_HASH = '';
      return id;
    }
    if (currentTab && valid(currentTab)) return currentTab;
    return tabs.length ? tabs[0].id : null;
  }

  function renderHomeSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    const otherTabs = (DATA.tabs || []).filter(tb => tb.enabled && tb.id !== tab.id).sort((a,b) => a.order - b.order);

    const quickLinks = otherTabs.map(ot => {
      const oi = t(ot.i18n, currentLang, {});
      const subLabel = ot.type === 'troops' ? ui.home_ql_troops : (ot.type === 'events' ? ui.home_ql_events : (oi.label || ''));
      return `
        <div class="quick-link" data-tab="${ot.id}">
          <span class="ql-icon">${ot.icon || ''}</span>
          <div class="ql-text">
            <strong>${oi.label || ot.id}</strong>
            <span>${subLabel}</span>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="welcome-banner">
        <h2>${i.title || ''}</h2>
        <p>${i.desc || ''}</p>
      </div>
      <div class="quick-links">${quickLinks}</div>
      <div class="callout">
        <strong>${i.noticeTitle || ''}</strong>
        <span>${i.noticeText || ''}</span>
      </div>
    `;
  }

  function heroTableHtml() {
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    const heroTable = DATA.heroTable || {};
    const heroNames = DATA.heroNames || {};
    const rows = Object.keys(heroTable).sort().map(key => {
      const row = heroTable[key];
      const name = heroNames[key] || key;
      const mark = v => v ? '✔️' : '❌';
      return `<tr>
        <td>${heroThumb(key, false)}</td>
        <td>${name}</td>
        <td>${mark(row.solo)}</td>
        <td>${mark(row.rally)}</td>
        <td>${mark(row.rallyCage)}</td>
        <td>${mark(row.rejoinCage)}</td>
      </tr>`;
    }).join('');
    return `
      <div class="section-title" style="font-size:1.4rem;">${ui.troops_table_title || ''}</div>
      <table class="data-table">
        <thead>
          <tr>
            <th>${ui.col_tier || ''}</th>
            <th>${ui.col_name || ''}</th>
            <th>${ui.troop3_name || 'Solo'}</th>
            <th>${ui.troop4_name || 'Rally'}</th>
            <th>${ui.col_rally || ''}</th>
            <th>${ui.col_rejoin || ''}</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // Ordre par défaut des blocs d'une carte (les ressources sont insérées
  // juste après les bandes de héros ; sans contenu, elles n'affichent rien).
  const CARD_LAYOUT_DEFAULT = ['strips', 'resources', 'desc', 'stats', 'carousel', 'video'];

  function heroCardHtml(c) {
    const tier = c.tier || 'tier-1';
    const tierLabel = t(c.tierLabel, currentLang);
    const name = t(c.name, currentLang);
    const desc = t(c.desc, currentLang);

    const stripsHtml = (c.strips || []).map(s => {
      const label = t(s.label, currentLang);
      const imgs = (s.heroes || []).map(k => heroThumb(k)).join('');
      return `<div class="hero-strip">
        ${label ? `<span class="hero-strip-label">${label}</span>` : ''}
        ${imgs ? `<div class="hero-strip-imgs">${imgs}</div>` : ''}
      </div>`;
    }).join('');

    const resourcesHtml = (c.resources || []).map(s => {
      const label = t(s.label, currentLang);
      const imgs = (s.items || []).map(k => resourceThumb(k)).join('');
      return `<div class="hero-strip">
        ${label ? `<span class="hero-strip-label">${label}</span>` : ''}
        ${imgs ? `<div class="hero-strip-imgs">${imgs}</div>` : ''}
      </div>`;
    }).join('');

    const statsHtml = (c.stats || []).map(st => {
      const label = t(st.label, currentLang);
      const value = t(st.value, currentLang);
      const tone = st.tone ? (' ' + st.tone) : '';
      return `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-value${tone}">${value}</span></div>`;
    }).join('');

    const carouselImgs = (c.carousel && c.carousel.enabled && Array.isArray(c.carousel.images))
      ? c.carousel.images.filter(im => im && im.src) : [];
    const carouselHtml = carouselImgs.length ? heroCarouselHtml(carouselImgs) : '';

    // Un lien par langue ; repli sur le français si la langue courante n'en a pas (cf. t()).
    const videoId = (c.video && c.video.enabled) ? extractYouTubeId(t(c.video.url, currentLang)) : '';
    const videoHtml = videoId ? heroVideoHtml(videoId) : '';

    const blocks = {
      strips: stripsHtml,
      resources: resourcesHtml,
      desc: desc ? `<div class="card-desc" style="margin-top:12px;">${formatRich(desc)}</div>` : '',
      stats: statsHtml,
      carousel: carouselHtml,
      video: videoHtml
    };
    let order = Array.isArray(c.layout) && c.layout.length ? c.layout.slice() : CARD_LAYOUT_DEFAULT.slice();
    // sécurité : on ajoute les blocs manquants à la fin, on ignore les inconnus
    CARD_LAYOUT_DEFAULT.forEach(k => { if (!order.includes(k)) order.push(k); });
    const body = order.map(k => blocks[k] || '').join('');

    return `
      <div class="card">

  function escapeAttr(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function bindReportForm(root) {
    const form = root.querySelector('#report-form');
    if (!form) return;

    // état visuel des cases cochées
    form.querySelectorAll('.report-check input').forEach(cb => {
      cb.addEventListener('change', () => cb.closest('.report-check').classList.toggle('checked', cb.checked));
    });

    const btn = form.querySelector('#report-submit');
    const statusEl = form.querySelector('#report-status');

    btn.addEventListener('click', async () => {
      statusEl.className = 'report-status';
      statusEl.textContent = '';

      // anti-spam : si le champ piège est rempli, on simule un succès sans rien envoyer
      if (form.querySelector('#report-website').value.trim()) {
        statusEl.className = 'report-status ok';
        statusEl.textContent = ri('success');
        return;
      }

      const checked = [...form.querySelectorAll('.report-check input:checked')];
      const context = form.querySelector('#report-context').value.trim();
      const proposal = form.querySelector('#report-proposal').value.trim();
      const reporter = form.querySelector('#report-reporter').value.trim();
      const lang = form.querySelector('#report-lang').value;

      if (!checked.length) { statusEl.className = 'report-status err'; statusEl.textContent = ri('needTab'); return; }
      if (!context) { statusEl.className = 'report-status err'; statusEl.textContent = ri('needContext'); return; }

      const tabIds = checked.map(c => c.value);
      const tabLabels = checked.map(c => c.dataset.label || c.value);

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = ri('sending');

      try {
        const fb = await ensureFirebase();
        await fb.addDoc(fb.collection(fb.db, 'reports'), {
          tabs: tabIds,
          tabLabels: tabLabels,
          lang: lang,
          context: context.slice(0, 4000),
          proposal: proposal.slice(0, 4000),
          reporter: reporter.slice(0, 60),
          status: 'new',
          createdAt: fb.serverTimestamp()
        });
        statusEl.className = 'report-status ok';
        statusEl.textContent = ri('success');
        // réinitialise le formulaire
        form.querySelectorAll('.report-check input:checked').forEach(cb => { cb.checked = false; cb.closest('.report-check').classList.remove('checked'); });
        form.querySelector('#report-context').value = '';
        form.querySelector('#report-proposal').value = '';
        form.querySelector('#report-reporter').value = '';
      } catch (e) {
        console.error('Envoi du signalement échoué :', e);
        statusEl.className = 'report-status err';
        statusEl.textContent = ri('error');
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    });
  }

  function renderFooter() {
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    document.getElementById('footer').innerHTML = `<span>${ui.footer || ''}</span>`;

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const sec = document.getElementById('section-' + id);
    if (sec) sec.classList.add('active');
    const btn = document.querySelector(`.nav-btn[data-tab="${id}"]`);
    if (btn) btn.classList.add('active');
    currentTab = id;
    // Reflète l'onglet dans l'URL sans polluer l'historique ni provoquer de saut natif
    // (les ancres réelles sont "section-<id>", jamais "<id>"). Une ancre d'ouverture
    // encore en attente n'est jamais écrasée par un repli : elle peut être honorée
    // à la réconciliation Firestore.
    try {
      if (!PENDING_HASH) {
        const target = id ? '#' + encodeURIComponent(id) : (location.pathname + location.search);
        if (location.hash !== ('#' + encodeURIComponent(id))) history.replaceState(null, '', target);
      }
    } catch (e) {}
    if (!SUPPRESS_SCROLL) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  let carouselTimers = [];
  function clearCarousels() {
    carouselTimers.forEach(id => clearInterval(id));
    carouselTimers = [];
  }
  function initCarousels() {
    clearCarousels();
    document.querySelectorAll('.hero-carousel').forEach(car => {
      const slides = [...car.querySelectorAll('.hc-slide')];
      const dots = [...car.querySelectorAll('.hc-dot')];
      if (slides.length <= 1) return;
      let cur = 0, timer = null;
      const show = i => {
        cur = (i + slides.length) % slides.length;
        slides.forEach((s, idx) => s.classList.toggle('active', idx === cur));
        dots.forEach((d, idx) => d.classList.toggle('active', idx === cur));
      };
      // Le défilement automatique se met en pause quand la page est en
      // arrière-plan ou quand le carrousel n'est pas visible (onglet inactif).
      const tick = () => { if (document.hidden || !car.offsetParent) return; show(cur + 1); };
      const restart = () => { if (timer) clearInterval(timer); timer = setInterval(tick, 4500); carouselTimers.push(timer); };
      const prev = car.querySelector('.hc-prev');
      const next = car.querySelector('.hc-next');
      if (prev) prev.addEventListener('click', () => { show(cur - 1); restart(); });
      if (next) next.addEventListener('click', () => { show(cur + 1); restart(); });
      dots.forEach((d, idx) => d.addEventListener('click', () => { show(idx); restart(); }));
      restart();
    });
  }

  function render() {
    renderNav();
    renderMain();
    renderFooter();
    initCarousels();
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = currentLang;
    const target = pickActiveTab();
    if (target) showSection(target);
  }

  function setActiveLangButton() {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  }

  // Langue initiale : préférence mémorisée, sinon langue du navigateur si gérée, sinon FR.
  function initLang() {
    const supported = ['fr', 'en', 'it', 'pt', 'ar', 'ja'];
    let lang = '';
    try { lang = localStorage.getItem('nk2_lang') || ''; } catch (e) {}
    if (!supported.includes(lang)) {
      const nav = (navigator.language || 'fr').slice(0, 2).toLowerCase();
      lang = supported.includes(nav) ? nav : 'fr';
    }
    currentLang = lang;
    setActiveLangButton();
  }

  // Changement de langue : on reste sur l'onglet courant et à la même position,
  // et on mémorise la préférence pour les prochaines visites.
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.lang === currentLang) return;
      currentLang = btn.dataset.lang;
      try { localStorage.setItem('nk2_lang', currentLang); } catch (e) {}
      setActiveLangButton();
      const savedY = window.scrollY;
      SUPPRESS_SCROLL = true;
      render();                 // pickActiveTab() conserve currentTab
      SUPPRESS_SCROLL = false;
      window.scrollTo(0, savedY);
    });
  });

  // Liens partageables / navigation par ancre : honore #onglet si modifié.
  window.addEventListener('hashchange', () => {
    let id = '';
    try { id = decodeURIComponent(location.hash.slice(1)); } catch (e) {}
    if (!id || id === currentTab) return;
    if (document.getElementById('section-' + id)) {
      PENDING_HASH = '';
      showSection(id);
    } else {
      // Onglet pas (encore) connu : l'ancre remplace l'attente en cours et sera
      // honorée si la réconciliation Firestore apporte cet onglet.
      PENDING_HASH = id;
    }
  });

  // ── Suivi de fréquentation (anonyme, sans inscription ni connexion) ──
  function parseUA(ua) {
    ua = ua || '';
    let device = 'desktop';
    if (/ipad|tablet|playbook|silk|(android(?!.*mobile))/i.test(ua)) device = 'tablet';
    else if (/mobile|iphone|ipod|android.*mobile|windows phone|blackberry|bb10|opera mini/i.test(ua)) device = 'mobile';

    let os = 'Autre';
    if (/windows nt/i.test(ua)) os = 'Windows';
    else if (/iphone|ipad|ipod/i.test(ua)) os = 'iOS';
    else if (/mac os x/i.test(ua)) os = 'macOS';
    else if (/android/i.test(ua)) os = 'Android';
    else if (/linux/i.test(ua)) os = 'Linux';

    let browser = 'Autre';
    if (/edg\//i.test(ua)) browser = 'Edge';
    else if (/opr\/|opera/i.test(ua)) browser = 'Opera';
    else if (/samsungbrowser/i.test(ua)) browser = 'Samsung';
    else if (/chrome\/|crios/i.test(ua) && !/edg\//i.test(ua)) browser = 'Chrome';
    else if (/firefox\/|fxios/i.test(ua)) browser = 'Firefox';
    else if (/safari/i.test(ua) && !/chrome|crios|android/i.test(ua)) browser = 'Safari';

    return { device, browser, os };
  }

  // Récupère le code pays (ISO 2 lettres) du visiteur, sans clé ni donnée stockée chez nous.
  async function getCountry() {
    const TIMEOUT = 1800;
    const WORKER_GEO = "https://nk2-translate.yannalogik.workers.dev/geo"; 

    async function tryFetch(url, pick) {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), TIMEOUT);
      try {
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(to);
        if (!r.ok) return '';
        const j = await r.json();
        const v = pick(j);
        return v ? String(v).toUpperCase().slice(0, 2) : '';
      } catch (e) { clearTimeout(to); return ''; }
    }

    if (WORKER_GEO) {
      const c = await tryFetch(WORKER_GEO, j => j && (j.country || j.countryCode));
      if (c) return c;
    }
    // 2) Repli sans configuration (service public gratuit, sans clé).
    //return await tryFetch('https://ipwho.is/?fields=country_code', j => j && j.country_code);
    // Toujours renvoyer une chaîne : `undefined` ferait rejeter l'écriture
    // Firestore entière (champ non supporté) et casserait le suivi de visite.
    return '';
  }

  async function trackVisit() {
    try {
      // une seule visite par session de navigation
      if (sessionStorage.getItem('nk2_visit_logged')) return;

      // identifiant visiteur anonyme persistant (pour distinguer les visiteurs uniques)
      let vid = '', returning = false;
      try {
        vid = localStorage.getItem('nk2_vid') || '';
        if (vid) { returning = true; }
        else {
          vid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
                : 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
          localStorage.setItem('nk2_vid', vid);
        }
      } catch (e) { /* navigation privée : pas d'identifiant persistant */ }

      const info = parseUA(navigator.userAgent || '');

      let country = '';
      try { country = await getCountry(); } catch (e) {}

      let ref = '';
      try {
        ref = document.referrer ? new URL(document.referrer).hostname : '';
        if (ref && ref === location.hostname) ref = '(interne)';
      } catch (e) {}
      if (!ref) ref = '(direct)';

      const fb = await ensureFirebase();
      await fb.addDoc(fb.collection(fb.db, 'visits'), {
        ts: Date.now(),
        createdAt: fb.serverTimestamp(),
        vid: String(vid).slice(0, 40),
        returning: returning,
        bl: (navigator.language || '').slice(0, 12),
        ref: ref.slice(0, 80),
        device: info.device,
        browser: info.browser,
        os: info.os,
        country: country || '',
        scr: (window.screen ? window.screen.width + 'x' + window.screen.height : '').slice(0, 16)
      });
      sessionStorage.setItem('nk2_visit_logged', '1');
    } catch (e) {
      // échec silencieux : le suivi ne doit jamais gêner l'affichage du wiki
      console.debug('Suivi de visite ignoré :', e && e.message);
    }
  }

  // ── Infobulle des capacités au survol d'un héros ──
  function heroTipHtml(key) {
    const ui = (DATA.ui && (DATA.ui[currentLang] || DATA.ui.fr)) || {};
    const row = (DATA.heroTable && DATA.heroTable[key]) || {};
    const name = (DATA.heroNames && DATA.heroNames[key]) || key;
    const mark = v => v ? '✔️' : '❌';
    const rows = [
      [ui.troop3_name || 'Solo', row.solo],
      [ui.troop4_name || 'Rally', row.rally],
      [ui.col_rally || 'Rally Cage', row.rallyCage],
      [ui.col_rejoin || 'Rejoin Cage', row.rejoinCage]
    ];
    return `<div class="ht-name">${escapeAttr(name)}</div>` +
      rows.map(([l, v]) => `<div class="ht-row"><span class="ht-label">${escapeAttr(l)}</span><span class="ht-val">${mark(v)}</span></div>`).join('');
  }

  function initHeroTooltips() {
    const tip = document.createElement('div');
    tip.className = 'hero-tip';
    document.body.appendChild(tip);
    let currentEl = null;

    function position(el) {
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      let left = r.left + r.width / 2 - tr.width / 2;
      let top = r.top - tr.height - 8;
      if (top < 8) top = r.bottom + 8; // bascule en dessous si pas de place au-dessus
      left = Math.max(8, Math.min(left, window.innerWidth - tr.width - 8));
      tip.style.left = left + 'px';
      tip.style.top = top + 'px';
    }
    function show(el) {
      const key = el.dataset.hero;
      if (!key) return;
      currentEl = el;
      tip.innerHTML = heroTipHtml(key);
      tip.classList.add('show');
      position(el);
    }
    function hide() { currentEl = null; tip.classList.remove('show'); }

    document.addEventListener('mouseover', e => {
      const el = e.target.closest('.hero-thumb[data-hero]');
      if (el) show(el);
    });
    document.addEventListener('mouseout', e => {
      const el = e.target.closest('.hero-thumb[data-hero]');
      if (el && !(e.relatedTarget && el.contains(e.relatedTarget))) hide();
    });
    // Accessibilité clavier
    document.addEventListener('focusin', e => {
      const el = e.target.closest('.hero-thumb[data-hero]');
      if (el) show(el);
    });
    document.addEventListener('focusout', e => {
      if (e.target.closest('.hero-thumb[data-hero]')) hide();
    });
    // Tactile : appui pour afficher/masquer
    document.addEventListener('click', e => {
      const el = e.target.closest('.hero-thumb[data-hero]');
      if (!el) { hide(); return; }
      if (currentEl === el && tip.classList.contains('show')) hide();
      else show(el);
    });
    // Évite une infobulle figée lors du défilement
    window.addEventListener('scroll', hide, true);
    window.addEventListener('resize', hide);
  }

  initLang();
  loadData();
  initHeroTooltips();

  // Le suivi de visite charge le SDK Firebase à la demande : on le déclenche
  // après le rendu, en temps mort, pour ne jamais retarder l'affichage du wiki.
  (function deferTrackVisit() {
    const run = () => trackVisit();
    if ('requestIdleCallback' in window) requestIdleCallback(run, { timeout: 3000 });
    else setTimeout(run, 1200);
  })();
</script>
