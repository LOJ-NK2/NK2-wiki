<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NK2 Wiki — Land of Jail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --card:      #161b22;
      --border:    #2a3040;
      --accent:    #c8960a;
      --accent2:   #e8b420;
      --danger:    #c0392b;
      --text:      #d4d8e0;
      --muted:     #6b7280;
      --green:     #2ecc71;
      --blue:      #3498db;
      --violet:    #9b59b6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    header {
      position: relative;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0d1117 0%, var(--bg) 100%);
      overflow: hidden;
    }
    .header-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
    }
    .header-inner {
      position: relative; max-width: 1100px; margin: 0 auto;
      padding: 48px 24px 40px; display: flex; align-items: center; gap: 24px;
    }
    .header-emblem {
      width: 72px; height: 72px; border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
      background: rgba(200,150,10,0.08); flex-shrink: 0;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .header-text h1 {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem, 6vw, 3.4rem);
      letter-spacing: 4px; color: #fff; line-height: 1;
    }
    .header-text h1 span { color: var(--accent); }
    .header-text p {
      font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
      color: var(--muted); letter-spacing: 2px; margin-top: 6px;
    }

    .lang-bar { background: var(--surface); border-bottom: 1px solid var(--border); }
    .lang-inner {
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; gap: 0; overflow-x: auto;
    }
    .lang-label {
      font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted);
      letter-spacing: 2px; padding-right: 16px; border-right: 1px solid var(--border);
      margin-right: 4px; white-space: nowrap;
    }
    .lang-btn {
      background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif;
      font-size: 0.82rem; font-weight: 600; padding: 10px 14px; cursor: pointer;
      letter-spacing: 1px; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
    }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    nav { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 2px; overflow-x: auto; }
    .nav-btn {
      background: none; border: none; color: var(--muted); font-family: 'Barlow', sans-serif;
      font-size: 0.85rem; font-weight: 600; padding: 14px 20px; cursor: pointer; letter-spacing: 1px;
      text-transform: uppercase; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
    }
    .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
    .nav-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .section { display: none; animation: fadeIn 0.3s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 4px; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 14px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent) 0%, transparent 100%); }
    .section-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 32px; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 24px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), transparent); }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-tier { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 2px; padding: 3px 8px; border: 1px solid; display: inline-block; margin-bottom: 12px; }
    .tier-1 { color: var(--blue); border-color: var(--blue); }
    .tier-2 { color: var(--accent); border-color: var(--accent); }
    .tier-3 { color: var(--danger); border-color: var(--danger); }
    .tier-4 { color: var(--danger); border-color: var(--danger); }
    .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; color: #fff; margin-bottom: 8px; }
    .card-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; white-space: pre-line; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; letter-spacing: 1px; }
    .stat-value { color: var(--text); font-weight: 600; text-align: right; }
    .stat-value.good { color: var(--green); }
    .stat-value.warn { color: var(--accent); }
    .stat-value.bad  { color: var(--danger); }

    .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 40px; }
    .event-card { background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 20px 24px; position: relative; transition: border-color 0.2s; }
    .event-card.type-war  { border-left-color: var(--danger); }
    .event-card.type-rally{ border-left-color: #9b59b6; }
    .event-card.type-resource { border-left-color: var(--green); }
    .event-date { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
    .event-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: #fff; margin-bottom: 6px; }
    .event-desc { font-size: 0.83rem; color: var(--muted); white-space: pre-line; }
    .event-tag { position: absolute; top: 20px; right: 20px; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 1px; padding: 3px 8px; border: 1px solid currentColor; }
    .tag-war      { color: var(--danger); }
    .tag-rally    { color: #9b59b6; }
    .tag-resource { color: var(--green); }
    .tag-alliance { color: var(--accent); }

    .callout { border: 1px solid var(--border); border-left: 4px solid var(--accent); background: rgba(200,150,10,0.05); padding: 16px 20px; margin-bottom: 24px; font-size: 0.88rem; white-space: pre-line; }
    .callout.danger { border-left-color: var(--danger); background: rgba(192,57,43,0.06); }
    .callout strong { color: var(--accent2); }
    .callout.danger strong { color: var(--danger); }

    .data-table { width: 100%; border-collapse: separate; font-size: 0.85rem; margin-bottom: 32px; overflow-x: auto; display: block; }
    .data-table th { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid var(--accent); padding: 10px 14px; text-align: center; background: var(--card); }
    .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: center; color: var(--text); }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }

    .welcome-banner { background: var(--card); border: 1px solid var(--border); padding: 32px; margin-bottom: 32px; position: relative; overflow: hidden; }
    .welcome-banner::after { content: '⚔'; position: absolute; right: 32px; top: 50%; transform: translateY(-50%); font-size: 6rem; opacity: 0.04; }
    .welcome-banner h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--accent2); margin-bottom: 10px; }
    .welcome-banner p { font-size: 0.92rem; color: var(--text); max-width: 600px; }

    .quick-links { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .quick-link { background: var(--card); border: 1px solid var(--border); padding: 18px 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
    .quick-link:hover { border-color: var(--accent); }
    .quick-link .ql-icon { font-size: 1.6rem; }
    .quick-link .ql-text strong { display: block; font-size: 0.88rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
    .quick-link .ql-text span { font-size: 0.75rem; color: var(--muted); }

    .hero-strip { margin: 12px 0 4px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
    .hero-strip-label { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 2px; color: var(--muted); display: block; margin-bottom: 8px; }
    .hero-strip-imgs { display: flex; flex-wrap: wrap; gap: 6px; }
    .hero-thumb { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .hero-thumb img { width: 56px; height: 56px; object-fit: cover; object-position: top; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); transition: border-color 0.2s, transform 0.2s; }
    .hero-thumb img:hover { border-color: var(--accent); transform: scale(1.2); }
    .hero-thumb span { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.5px; text-align: center; }

    /* ── CARROUSEL DE CARTE ── */
    .hero-carousel { position: relative; margin-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px; }
    .hc-track { position: relative; width: 100%; aspect-ratio:3/4 ; background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
    .hc-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.45s ease; }
    .hc-slide.active { opacity: 1; }
    .hc-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hc-prev, .hc-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.45); border: none; color: #fff; font-size: 1.3rem; line-height: 1; cursor: pointer; padding: 4px 10px; z-index: 2; transition: background 0.2s, color 0.2s; }
    .hc-prev { left: 6px; } .hc-next { right: 6px; }
    .hc-prev:hover, .hc-next:hover { background: var(--accent); color: #0a0c0f; }
    .hc-dots { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
    .hc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background 0.2s; }
    .hc-dot.active { background: var(--accent); }

    footer { border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 2px; }

    /* ── CUSTOM SECTION TYPES ── */
    .content-block { background: var(--card); border: 1px solid var(--border); padding: 20px 24px; margin-bottom: 16px; }
    .content-block.callout { border-left: 4px solid var(--accent); background: rgba(200,150,10,0.05); }
    .content-block h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 1.5px; color: #fff; margin-bottom: 8px; }
    .content-block.callout h3 { color: var(--accent2); }
    .content-block p { font-size: 0.9rem; color: var(--text); white-space: pre-line; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .gallery-item { background: var(--card); border: 1px solid var(--border); overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
    .gallery-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .gallery-item img { width: 100%; display: block; aspect-ratio: 4/3; object-fit: cover; background: var(--surface); }
    .gallery-item .caption { padding: 10px 14px; font-size: 0.82rem; color: var(--muted); }

    .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .link-card { background: var(--card); border: 1px solid var(--border); padding: 18px 20px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all 0.2s; }
    .link-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .link-card .lk-icon { font-size: 1.6rem; flex-shrink: 0; }
    .link-card .lk-text strong { display: block; font-size: 0.9rem; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
    .link-card .lk-text span { font-size: 0.76rem; color: var(--muted); }

    .loading-screen {
      position: fixed; inset: 0; background: var(--bg); z-index: 999;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace; color: var(--accent); letter-spacing: 3px; font-size: 0.9rem;
    }
    .admin-link {
      position: fixed; bottom: 16px; right: 16px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      color: var(--muted); text-decoration: none; opacity: 0.4; letter-spacing: 1px;
      border: 1px solid var(--border); padding: 4px 8px; transition: opacity 0.2s;
    }
    .admin-link:hover { opacity: 1; color: var(--accent); }

    /* ── FORMULAIRE DE SIGNALEMENT ── */
    .report-form { max-width: 720px; }
    .report-field { margin-bottom: 22px; }
    .report-field > label {
      display: block; font-family: 'Share Tech Mono', monospace; font-size: 0.68rem;
      letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px;
    }
    .report-field input[type="text"],
    .report-field textarea,
    .report-field select {
      width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 11px 13px; font-family: 'Barlow', sans-serif; font-size: 0.92rem; border-radius: 2px;
    }
    .report-field input[type="text"]:focus,
    .report-field textarea:focus,
    .report-field select:focus { outline: none; border-color: var(--accent); }
    .report-field textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .report-tabs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .report-check {
      display: flex; align-items: center; gap: 9px; background: var(--surface);
      border: 1px solid var(--border); padding: 9px 12px; cursor: pointer; transition: border-color 0.2s;
      font-size: 0.86rem; color: var(--text);
    }
    .report-check:hover { border-color: var(--accent); }
    .report-check input { width: auto; accent-color: var(--accent); cursor: pointer; }
    .report-check.checked { border-color: var(--accent); background: rgba(200,150,10,0.06); }
    .report-honey { position: absolute; left: -9999px; opacity: 0; height: 0; overflow: hidden; }
    .report-submit {
      font-family: 'Barlow', sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      background: var(--accent); color: #0a0c0f; border: 1px solid var(--accent); padding: 12px 26px;
      font-size: 0.88rem; cursor: pointer; border-radius: 2px; transition: background 0.2s;
    }
    .report-submit:hover { background: var(--accent2); }
    .report-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .report-status { margin-top: 16px; font-size: 0.88rem; min-height: 1.2rem; }
    .report-status.ok { color: var(--green); }
    .report-status.err { color: var(--danger); }
    html[dir="rtl"] .report-field > label { text-align: right; }

    @media (max-width: 600px) {
      .header-inner { padding: 28px 16px 24px; }
      .lang-inner, .nav-inner { padding: 0 12px; }
      main { padding: 24px 16px 60px; }
      .cards-grid { grid-template-columns: 1fr; }
      .calendar-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loading" class="loading-screen">CHARGEMENT...</div>

<header>
  <div class="header-grid"></div>
  <div class="header-inner">
    <div class="header-emblem">⚔️</div>
    <div class="header-text">
      <h1>NK2 <span>WIKI</span></h1>
      <p>// LAND OF JAIL</p>
    </div>
  </div>
</header>

<div class="lang-bar">
  <div class="lang-inner">
    <span class="lang-label">LANG</span>
    <button class="lang-btn active" data-lang="fr">🇫🇷</button>
    <button class="lang-btn" data-lang="en">🇬🇧</button>
    <button class="lang-btn" data-lang="it">🇮🇹</button>
    <button class="lang-btn" data-lang="pt">🇧🇷</button>
    <button class="lang-btn" data-lang="ar">🇸🇦</button>
    <button class="lang-btn" data-lang="ja">🇯🇵</button>
  </div>
</div>

<nav>
  <div class="nav-inner" id="nav-inner"></div>
</nav>

<main id="main"></main>

<footer id="footer"></footer>

  };
  const REPORT_TAB_ID = '__report__';
  function ri(key) { return (REPORT_I18N[currentLang] || REPORT_I18N.fr)[key] || REPORT_I18N.fr[key] || ''; }

  async function loadData() {
    const loadingEl = document.getElementById('loading');
    try {
      const snap = await getDoc(doc(db, "site", "content"));
      if (snap.exists() && snap.data() && (snap.data().tabs || []).length) {
        DATA = snap.data();
      } else {
        // Firestore vide → bascule sur les données par défaut du repo
        DATA = await loadFallback();
      }
    } catch (e) {
      // Erreur de lecture (réseau, règles...) → tente le fallback local
      console.error("Firestore indisponible :", e);
      try {
        DATA = await loadFallback();
      } catch (e2) {
        loadingEl.innerHTML = "ERREUR DE CHARGEMENT<br><span style='font-size:0.7rem'>Vérifiez la connexion ou chargez les données via admin.html</span>";
        return;
      }
    }
    render();
    loadingEl.style.display = 'none';
  }

  async function loadFallback() {
    const resp = await fetch('seed-data.json', { cache: 'no-store' });
    if (!resp.ok) throw new Error('seed-data.json introuvable');
    return await resp.json();
  }

  function t(obj, lang, fallback) {
    if (obj === null || obj === undefined) return fallback || '';
    if (typeof obj === 'string') return obj;
    return obj[lang] !== undefined ? obj[lang] : (obj['fr'] !== undefined ? obj['fr'] : (fallback || ''));
  }

  function heroThumb(key, label) {
    const name = (DATA.heroNames && DATA.heroNames[key]) || key;
    return `<div class="hero-thumb"><img src="${IMAGES_BASE}${key}.jpg" alt="${key}">${label !== false ? `<span>${name}</span>` : ''}</div>`;
  }

  function renderNav() {
    const navInner = document.getElementById('nav-inner');
    const tabs = (DATA.tabs || []).filter(tb => tb.enabled).sort((a,b) => a.order - b.order);
    navInner.innerHTML = tabs.map((tab, i) => {
      const langData = (tab.i18n && (tab.i18n[currentLang] || tab.i18n.fr)) || {};
      const label = langData.label || tab.id;
      return `<button class="nav-btn ${i === 0 ? 'active' : ''}" data-tab="${tab.id}">${tab.icon || ''} <span>${label}</span></button>`;
    }).join('')
      + `<button class="nav-btn" data-tab="${REPORT_TAB_ID}">📝 <span>${ri('navLabel')}</span></button>`;

    navInner.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => showSection(btn.dataset.tab));
    });

    if (tabs.length) showSection(tabs[0].id);
  }

  function renderHomeSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    const otherTabs = (DATA.tabs || []).filter(tb => tb.enabled && tb.id !== tab.id).sort((a,b) => a.order - b.order);

    const quickLinks = otherTabs.map(ot => {
      const oi = t(ot.i18n, currentLang, {});
      const subLabel = ot.type === 'troops' ? ui.home_ql_troops : (ot.type === 'events' ? ui.home_ql_events : (oi.label || ''));
      return `
        <div class="quick-link" data-tab="${ot.id}">

          <div class="ql-text">
            <strong>${oi.label || ot.id}</strong>
            <span>${subLabel}</span>
          </div>
        </div>`;
    }).join('');

    return `

        <h2>${i.title || ''}</h2>
        <p>${i.desc || ''}</p>
      </div>
      <div class="quick-links">${quickLinks}</div>
      <div class="callout">
        <strong>${i.noticeTitle || ''}</strong>
        <span>${i.noticeText || ''}</span>
      </div>

  function heroTableHtml() {
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    const heroTable = DATA.heroTable || {};
    const heroNames = DATA.heroNames || {};
    const rows = Object.keys(heroTable).sort().map(key => {
      const row = heroTable[key];
      const name = heroNames[key] || key;
      const mark = v => v ? '✔️' : '❌';
      return `<tr>
        <td>${heroThumb(key, false)}</td>
        <td>${name}</td>
        <td>${mark(row.solo)}</td>
        <td>${mark(row.rally)}</td>
        <td>${mark(row.rallyCage)}</td>
        <td>${mark(row.rejoinCage)}</td>

      <table class="data-table">
        <thead>

            <th>${ui.col_tier || ''}</th>

            <th>${ui.troop3_name || 'Solo'}</th>
            <th>${ui.troop4_name || 'Rally'}</th>

        <tbody>${rows}</tbody>
      </table>

  function heroCardHtml(c) {
    const tier = c.tier || 'tier-1';
    const tierLabel = t(c.tierLabel, currentLang);
    const name = t(c.name, currentLang);
    const desc = t(c.desc, currentLang);
    const stripsHtml = (c.strips || []).map(s => {
      const label = t(s.label, currentLang);
      const imgs = (s.heroes || []).map(k => heroThumb(k)).join('');
      return `<div class="hero-strip">
        ${label ? `<span class="hero-strip-label">${label}</span>` : ''}
        ${imgs ? `<div class="hero-strip-imgs">${imgs}</div>` : ''}
      </div>`;
    }).join('');
    const statsHtml = (c.stats || []).map(st => {
      const label = t(st.label, currentLang);
      const value = t(st.value, currentLang);
      const tone = st.tone ? (' ' + st.tone) : '';
      return `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-value${tone}">${value}</span></div>`;
    }).join('');
    const carouselImgs = (c.carousel && c.carousel.enabled && Array.isArray(c.carousel.images))
      ? c.carousel.images.filter(im => im && im.src) : [];
    const carouselHtml = carouselImgs.length ? heroCarouselHtml(carouselImgs) : '';
    return `
      <div class="card">
        ${tierLabel ? `<div class="card-tier ${tier}">${tierLabel}</div>` : ''}
        ${name ? `<div class="card-name">${name}</div>` : ''}
        ${stripsHtml}
        ${desc ? `<div class="card-desc" style="margin-top:12px;">${desc}</div>` : ''}
        ${statsHtml}
        ${carouselHtml}
      </div>
    `;
  }

  function heroCarouselHtml(images) {
    const multi = images.length > 1;
    return `<div class="hero-carousel">
      <div class="hc-track">
        ${images.map((im, idx) => `<div class="hc-slide ${idx === 0 ? 'active' : ''}"><img src="${im.src}" alt="" loading="lazy"></div>`).join('')}
      </div>
      ${multi ? `<button class="hc-prev" type="button" aria-label="Précédent">‹</button>
      <button class="hc-next" type="button" aria-label="Suivant">›</button>
      <div class="hc-dots">${images.map((_, idx) => `<span class="hc-dot ${idx === 0 ? 'active' : ''}" data-idx="${idx}"></span>`).join('')}</div>` : ''}
    </div>`;
  }

  function renderEventsSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    const events = DATA.events || [];

    const cards = events.map(ev => {
      const name = t(ev.name, currentLang);
      const desc = t(ev.desc, currentLang);
      const tag = t(ev.tag, currentLang);
      return `
        <div class="event-card type-${ev.type}">
          <div class="event-tag tag-${ev.type}">${tag}</div>
          <div class="event-date">${t(ev.date, currentLang)}</div>

          <div class="event-desc">${desc}</div>

    }).join('');

    return `
      <div class="section-title">${i.title || ''}</div>
      <div class="section-sub">${i.sub || ''}</div>

        <span>${i.warningText || ''}</span>

  function renderCustomSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    return `
      <div class="section-title">${i.title || tab.id}</div>
      ${i.sub ? `<div class="section-sub">${i.sub}</div>` : ''}
      ${i.desc ? `<div class="welcome-banner"><p style="white-space:pre-line;">${i.desc}</p></div>` : ''}
    `;

  function renderRichtextSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const blocks = tab.blocks || [];
    const blocksHtml = blocks.map(b => {
      const title = t(b.title, currentLang);
      const text = t(b.text, currentLang);
      const cls = b.style === 'callout' ? 'content-block callout' : 'content-block';
      return `<div class="${cls}">
        ${title ? `<h3>${title}</h3>` : ''}
        ${text ? `<p>${text}</p>` : ''}
      </div>`;
    }).join('');
    return `
      <div class="section-title">${i.title || tab.id}</div>
      ${i.sub ? `<div class="section-sub">${i.sub}</div>` : ''}
      ${blocksHtml}
    `;

  function renderGallerySection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const images = tab.images || [];
    const itemsHtml = images.map(img => {
      const caption = t(img.caption, currentLang);
      return `<div class="gallery-item">
        <img src="${img.src || ''}" alt="${caption || ''}" loading="lazy">
        ${caption ? `<div class="caption">${caption}</div>` : ''}
      </div>`;
    }).join('');
    return `
      <div class="section-title">${i.title || tab.id}</div>
      ${i.sub ? `<div class="section-sub">${i.sub}</div>` : ''}
      <div class="gallery-grid">${itemsHtml}</div>
    `;
  }

  function renderLinksSection(tab) {
    const i = t(tab.i18n, currentLang, {});
    const links = tab.links || [];
    const linksHtml = links.map(lk => {
      const title = t(lk.title, currentLang);
      const sub = t(lk.sub, currentLang);
      const url = lk.url || '#';
      const external = /^https?:\/\//i.test(url);
      return `<a class="link-card" href="${url}" ${external ? 'target="_blank" rel="noopener noreferrer"' : ''}>
        <span class="lk-icon">${lk.icon || '🔗'}</span>
        <div class="lk-text">
          <strong>${title || url}</strong>
          ${sub ? `<span>${sub}</span>` : ''}
        </div>
      </a>`;
    }).join('');
    return `
      <div class="section-title">${i.title || tab.id}</div>
      ${i.sub ? `<div class="section-sub">${i.sub}</div>` : ''}
      ${i.desc ? `<div class="welcome-banner"><p style="white-space:pre-line;">${i.desc}</p></div>` : ''}
      <div class="links-grid">${linksHtml}</div>

  function renderSectionContent(tab) {
    switch (tab.type) {
      case 'home': return renderHomeSection(tab);
      case 'troops': return renderTroopsSection(tab);
      case 'events': return renderEventsSection(tab);
      case 'richtext': return renderRichtextSection(tab);
      case 'gallery': return renderGallerySection(tab);
      case 'links': return renderLinksSection(tab);
      case 'custom': return renderCustomSection(tab);
      default: return renderCustomSection(tab);
    }
  }

    const tabs = (DATA.tabs || []).filter(tb => tb.enabled).sort((a,b) => a.order - b.order);
    main.innerHTML = tabs.map((tab, i) => `
      <div id="section-${tab.id}" class="section ${i === 0 ? 'active' : ''}">
        ${renderSectionContent(tab)}
      </div>
    `).join('')
      + `<div id="section-${REPORT_TAB_ID}" class="section">${renderReportSection()}</div>`;

    // quick-link clicks
    main.querySelectorAll('.quick-link[data-tab]').forEach(el => {
      el.addEventListener('click', () => showSection(el.dataset.tab));
    });

    bindReportForm(main);
  }

    const tabs = (DATA.tabs || []).filter(tb => tb.enabled).sort((a,b) => a.order - b.order);
    const checks = tabs.map(tab => {
      const li = t(tab.i18n, currentLang, {});
      const label = li.label || tab.id;
      return `<label class="report-check">
        <input type="checkbox" value="${tab.id}" data-label="${(li && li.label) ? escapeAttr((tab.i18n && tab.i18n.fr && tab.i18n.fr.label) || tab.id) : escapeAttr(tab.id)}">

      </label>`;
    }).join('');

    const langOpts = [
      ['fr','🇫🇷 Français'],['en','🇬🇧 English'],['it','🇮🇹 Italiano'],
      ['pt','🇧🇷 Português'],['ar','🇸🇦 العربية'],['ja','🇯🇵 日本語']
    ].map(([c,l]) => `<option value="${c}" ${c===currentLang?'selected':''}>${l}</option>`).join('');

    return `
      <div class="section-title">${ri('title')}</div>
      <div class="section-sub">${ri('sub')}</div>
      <div class="callout"><span>${ri('intro')}</span></div>

      <div class="report-form" id="report-form">

          <label>${ri('tabsLabel')}</label>
          <div class="report-tabs-grid" id="report-tabs">${checks}</div>
        </div>

        <div class="report-field">
          <label>${ri('langLabel')}</label>
          <select id="report-lang">${langOpts}</select>
        </div>

        <div class="report-field">
          <label>${ri('contextLabel')}</label>
          <textarea id="report-context" placeholder="${ri('contextPh')}"></textarea>
        </div>

        <div class="report-field">
          <label>${ri('proposalLabel')}</label>
          <textarea id="report-proposal" placeholder="${ri('proposalPh')}"></textarea>
        </div>

        <div class="report-field">
          <label>${ri('reporterLabel')}</label>
          <input type="text" id="report-reporter" maxlength="60" autocomplete="off">
        </div>

        <div class="report-honey" aria-hidden="true">
          <label>Website</label>
          <input type="text" id="report-website" tabindex="-1" autocomplete="off">
        </div>

        <button type="button" class="report-submit" id="report-submit">${ri('submit')}</button>
        <div class="report-status" id="report-status"></div>
      </div>
    `;
  }

  function escapeAttr(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function bindReportForm(root) {
    const form = root.querySelector('#report-form');
    if (!form) return;

    // état visuel des cases cochées
    form.querySelectorAll('.report-check input').forEach(cb => {
      cb.addEventListener('change', () => cb.closest('.report-check').classList.toggle('checked', cb.checked));
    });

    const btn = form.querySelector('#report-submit');
    const statusEl = form.querySelector('#report-status');

    btn.addEventListener('click', async () => {
      statusEl.className = 'report-status';
      statusEl.textContent = '';

      // anti-spam : si le champ piège est rempli, on simule un succès sans rien envoyer
      if (form.querySelector('#report-website').value.trim()) {
        statusEl.className = 'report-status ok';
        statusEl.textContent = ri('success');
        return;
      }

      const checked = [...form.querySelectorAll('.report-check input:checked')];
      const context = form.querySelector('#report-context').value.trim();
      const proposal = form.querySelector('#report-proposal').value.trim();
      const reporter = form.querySelector('#report-reporter').value.trim();
      const lang = form.querySelector('#report-lang').value;

      if (!checked.length) { statusEl.className = 'report-status err'; statusEl.textContent = ri('needTab'); return; }
      if (!context) { statusEl.className = 'report-status err'; statusEl.textContent = ri('needContext'); return; }

      const tabIds = checked.map(c => c.value);
      const tabLabels = checked.map(c => c.dataset.label || c.value);

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = ri('sending');

      try {
        await addDoc(collection(db, 'reports'), {
          tabs: tabIds,
          tabLabels: tabLabels,
          lang: lang,
          context: context.slice(0, 4000),
          proposal: proposal.slice(0, 4000),
          reporter: reporter.slice(0, 60),
          status: 'new',
          createdAt: serverTimestamp()
        });
        statusEl.className = 'report-status ok';
        statusEl.textContent = ri('success');
        // réinitialise le formulaire
        form.querySelectorAll('.report-check input:checked').forEach(cb => { cb.checked = false; cb.closest('.report-check').classList.remove('checked'); });
        form.querySelector('#report-context').value = '';
        form.querySelector('#report-proposal').value = '';
        form.querySelector('#report-reporter').value = '';
      } catch (e) {
        console.error('Envoi du signalement échoué :', e);
        statusEl.className = 'report-status err';
        statusEl.textContent = ri('error');
      } finally {
        btn.disabled = false;
        btn.textContent = original;
      }
    });
  }

  function renderFooter() {
    const ui = DATA.ui[currentLang] || DATA.ui.fr;
    document.getElementById('footer').innerHTML = `<span>${ui.footer || ''}</span>`;
  }

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const sec = document.getElementById('section-' + id);
    if (sec) sec.classList.add('active');
    const btn = document.querySelector(`.nav-btn[data-tab="${id}"]`);
    if (btn) btn.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  let carouselTimers = [];
  function clearCarousels() {
    carouselTimers.forEach(id => clearInterval(id));
    carouselTimers = [];
  }
  function initCarousels() {
    clearCarousels();
    document.querySelectorAll('.hero-carousel').forEach(car => {
      const slides = [...car.querySelectorAll('.hc-slide')];
      const dots = [...car.querySelectorAll('.hc-dot')];
      if (slides.length <= 1) return;
      let cur = 0, timer = null;
      const show = i => {
        cur = (i + slides.length) % slides.length;
        slides.forEach((s, idx) => s.classList.toggle('active', idx === cur));
        dots.forEach((d, idx) => d.classList.toggle('active', idx === cur));
      };
      const restart = () => { if (timer) clearInterval(timer); timer = setInterval(() => show(cur + 1), 4500); carouselTimers.push(timer); };
      const prev = car.querySelector('.hc-prev');
      const next = car.querySelector('.hc-next');
      if (prev) prev.addEventListener('click', () => { show(cur - 1); restart(); });
      if (next) next.addEventListener('click', () => { show(cur + 1); restart(); });
      dots.forEach((d, idx) => d.addEventListener('click', () => { show(idx); restart(); }));
      restart();
    });
  }

  function render() {
    renderNav();
    renderMain();
    renderFooter();
    initCarousels();
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  }

  // language switching
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── Suivi de fréquentation (anonyme, sans inscription ni connexion) ──
  function parseUA(ua) {
    ua = ua || '';
    let device = 'desktop';
    if (/ipad|tablet|playbook|silk|(android(?!.*mobile))/i.test(ua)) device = 'tablet';
    else if (/mobile|iphone|ipod|android.*mobile|windows phone|blackberry|bb10|opera mini/i.test(ua)) device = 'mobile';

    let os = 'Autre';
    if (/windows nt/i.test(ua)) os = 'Windows';
    else if (/iphone|ipad|ipod/i.test(ua)) os = 'iOS';
    else if (/mac os x/i.test(ua)) os = 'macOS';
    else if (/android/i.test(ua)) os = 'Android';
    else if (/linux/i.test(ua)) os = 'Linux';

    let browser = 'Autre';
    if (/edg\//i.test(ua)) browser = 'Edge';
    else if (/opr\/|opera/i.test(ua)) browser = 'Opera';
    else if (/samsungbrowser/i.test(ua)) browser = 'Samsung';
    else if (/chrome\/|crios/i.test(ua) && !/edg\//i.test(ua)) browser = 'Chrome';
    else if (/firefox\/|fxios/i.test(ua)) browser = 'Firefox';
    else if (/safari/i.test(ua) && !/chrome|crios|android/i.test(ua)) browser = 'Safari';

    return { device, browser, os };
  }

  // Récupère le code pays (ISO 2 lettres) du visiteur, sans clé ni donnée stockée chez nous.
  async function getCountry() {
    const TIMEOUT = 1800;
    const WORKER_GEO = "https://nk2-translate.yannalogik.workers.dev/geo"; 

    async function tryFetch(url, pick) {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), TIMEOUT);
      try {
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(to);
        if (!r.ok) return '';
        const j = await r.json();
        const v = pick(j);
        return v ? String(v).toUpperCase().slice(0, 2) : '';
      } catch (e) { clearTimeout(to); return ''; }
    }

    if (WORKER_GEO) {
      const c = await tryFetch(WORKER_GEO, j => j && (j.country || j.countryCode));
      if (c) return c;
    }
    // 2) Repli sans configuration (service public gratuit, sans clé).
    //return await tryFetch('https://ipwho.is/?fields=country_code', j => j && j.country_code);
  }

  async function trackVisit() {
    try {
      // une seule visite par session de navigation
      if (sessionStorage.getItem('nk2_visit_logged')) return;

      // identifiant visiteur anonyme persistant (pour distinguer les visiteurs uniques)
      let vid = '', returning = false;
      try {
        vid = localStorage.getItem('nk2_vid') || '';
        if (vid) { returning = true; }
        else {
          vid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
                : 'v' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
          localStorage.setItem('nk2_vid', vid);
        }
      } catch (e) { /* navigation privée : pas d'identifiant persistant */ }

      const info = parseUA(navigator.userAgent || '');

      let country = '';
      try { country = await getCountry(); } catch (e) {}

      let ref = '';
      try {
        ref = document.referrer ? new URL(document.referrer).hostname : '';
        if (ref && ref === location.hostname) ref = '(interne)';
      } catch (e) {}
      if (!ref) ref = '(direct)';

      await addDoc(collection(db, 'visits'), {
        ts: Date.now(),
        createdAt: serverTimestamp(),
        vid: String(vid).slice(0, 40),
        returning: returning,
        bl: (navigator.language || '').slice(0, 12),
        ref: ref.slice(0, 80),
        device: info.device,
        browser: info.browser,
        os: info.os,
        country: country,
        scr: (window.screen ? window.screen.width + 'x' + window.screen.height : '').slice(0, 16)
      });
      sessionStorage.setItem('nk2_visit_logged', '1');
    } catch (e) {
      // échec silencieux : le suivi ne doit jamais gêner l'affichage du wiki
      console.debug('Suivi de visite ignoré :', e && e.message);
    }
  }

  loadData();
  trackVisit();
</script>
